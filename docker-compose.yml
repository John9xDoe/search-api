services:
  postgres:
    image: postgres:16
    container_name: searchapi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: searchapi
      POSTGRES_USER: searchapi
      POSTGRES_PASSWORD: searchapi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: